<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YiffPhotos</title>
</head>
   <style>
        body { font-family: Arial, sans-serif;background-color: #0E1B24;        }
        ul {list-style-type: none;
            padding:   0;

        }

        b1 {font-size:24px;
            color: #000853;    
        }

        .t1 { position: absolute;top: 0px;
            left: 50%;transform: translateX(-50%);list-style: none;  }    
        .tekst1 {  font-size: 30px;
            color: #88bc96;margin-top: 68px;text-align: center;       }
        
        .upload-section { text-align: center;   margin: 40px 20px;  }
        
        .upload-btn { background-color: #88bc96;
            color: #0E1B24;border: none; padding: 12px 30px;font-size: 16px;
            border-radius: 5px;cursor: pointer;margin: 5px;        }
        
        .upload-btn:hover {  background-color: #6aa380;       }
        
        #fileInput { display: none;  }
        
        .gallery {  display: grid;  grid-template-columns: repeat(4, 1fr);gap: 15px;
            margin: 40px 20px;max-width: 1200px;margin-left: auto;margin-right: auto;        }
        
        .gallery-item {  position: relative;overflow: hidden;border-radius: 5px;
            background-color: #1a2a35;cursor: pointer;aspect-ratio: 1;        }
        
        .gallery-item img,
        .gallery-item video {  width: 100%;height: 100%;object-fit: cover;transition: transform 0.2s;        }
        
        .gallery-item:hover img,
        .gallery-item:hover video { transform: scale(1.1);       }
        
        .modal {  display: none;position: fixed;
            top: 0;left: 0;width: 100%;height: 100%;background-color: rgba(0, 0, 0, 0.8);z-index: 1000;
            align-items: center;justify-content: center;        }
        
        .modal.active {  display: flex;       }
        
        .modal-content {  max-width: 90vw;max-height: 90vh;position: relative;        }
        
        .modal-content img,
        .modal-content video {  max-width: 100%;max-height: 100%;        }
        
        .close-btn {  position: absolute;top: 10px;right: 20px;
            font-size: 30px;color: white;cursor: pointer;        }
        
        @media (max-width: 1024px) {  .gallery { grid-template-columns: repeat(3, 1fr);       }  }
        
        @media (max-width: 768px) {  .gallery { grid-template-columns: repeat(2, 1fr);       }  }
        
        @media (max-width: 480px) {  .gallery { grid-template-columns: 1fr;       }  }
    </style>
<body>
    <a href="kutas.html">
    <img src="yiffHub.jpg" alt="yiffhub logo"
        style="max-width: 150px; height: auto; position: absolute; top: 10px; left: 10px;">
<div class="główne1" style="text-align: center; margin-top: -50px;">
</a>
    <div class="tekst1">Witam na twojim osobistym kreatorze yiff page! czy coś...</div>  
    <!-- ciągle nie wiem czemu to dźiała... ale gites -->
    <div class="upload-section">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Dodaj swojego yiffa furasie!</button>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    </div>
    
    <div class="gallery" id="gallery"></div>
    
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
    </div>
</div>

<script>
    const XxGallerYxX = document.getElementById('gallery');
    const UpLoAdFiLe = document.getElementById('fileInput');
    const MoDaL = document.getElementById('modal');
    const mOdAlCoNtEnT = document.getElementById('modalContent');
    
    <!-- to ja z przeszłości... nie wiem czemu to działa, jakiś random na reddicie dał i działa -->
    function loAdGaLeRy() {
        const FiLeS = JSON.parse(localStorage.getItem('gallery')) || [];
        XxGallerYxX.innerHTML = '';
        FiLeS.forEach((fIlE, iNdEx) => {
            const ItEm = document.createElement('div');
            ItEm.className = 'gallery-item';
            
            if (fIlE.type.startsWith('image/')) {
                ItEm.innerHTML = `<img src="${fIlE.data}" onclick="OpEnMoDaL(${iNdEx})">`;
            } else {
                ItEm.innerHTML = `<video src="${fIlE.data}" onclick="OpEnMoDaL(${iNdEx})"></video>`;
            }
            
            XxGallerYxX.appendChild(ItEm);
        });
    }

    // jak to kurwa działa??? stackoverflow.com/questions/12345 - może być do konia
    function OpEnMoDaL(iNdEx) {
        const FiLeS = JSON.parse(localStorage.getItem('gallery')) || [];
        const fIlE = FiLeS[iNdEx];
        
        let CoNtEnT;
        if (fIlE.type.startsWith('image/')) {
            CoNtEnT = `<img src="${fIlE.data}">`;
        } else {
            CoNtEnT = `<video src="${fIlE.data}" controls autoplay></video>`;
        }
        
        mOdAlCoNtEnT.innerHTML = `<span class="close-btn" onclick="closeModal()">&times;</span>${CoNtEnT}`;
        MoDaL.classList.add('active');
    }
    
    function closeModal() {
        MoDaL.classList.remove('active');
    }

    // ŻEBY BYŁO WSZYTKO OKEJ, TEN KOD MUSI ZOSTAĆ TUTAJ, NIE RUSZAĆ
    UpLoAdFiLe.addEventListener('change', (eVeNt) => {
        const FiLeS = JSON.parse(localStorage.getItem('gallery')) || [];
        
        Array.from(eVeNt.target.files).forEach(fIlE => {
            const ReAdEr = new FileReader();
            ReAdEr.onload = (eEvT) => {
                FiLeS.push({
                    type: fIlE.type,
                    data: eEvT.target.result,
                    name: fIlE.name
                });
                localStorage.setItem('gallery', JSON.stringify(FiLeS));
                loAdGaLeRy();
            };
            ReAdEr.readAsDataURL(fIlE);
        });
        // jak usunę tę linię to się wszystko sypie, nie wiem dlaczego ale DZIAŁA
        UpLoAdFiLe.value = '';
    });
    
    MoDaL.addEventListener('click', (eVeNt) => {
        if (eVeNt.target === MoDaL) closeModal();
    });
    
    loAdGaLeRy();
</script>

</body>
</html>
